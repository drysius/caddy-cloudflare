name: build

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

jobs:
  test:
    name: lint + tests (${{ matrix.pkg }})
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write
      pull-requests: write
    strategy:
      fail-fast: false
      matrix:
        pkg: [cf-hostname-reconciler, cf-failover]
    defaults:
      run:
        working-directory: ${{ matrix.pkg }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: syntax check
        run: for f in src/*.js; do node --check "$f"; done

      - name: test
        run: node --test --test-reporter=spec --test-reporter-destination=stdout
              --test-reporter=junit --test-reporter-destination=junit.xml

      # Renders the per-test results as a check run with annotations on failures.
      - name: publish test report
        uses: mikepenz/action-junit-report@v5
        if: always()
        with:
          report_paths: ${{ matrix.pkg }}/junit.xml
          check_name: node test results (${{ matrix.pkg }})
          include_passed: true
          detailed_summary: true

      - name: upload reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-reports-${{ matrix.pkg }}
          path: ${{ matrix.pkg }}/junit.xml
          retention-days: 14

  images:
    name: build ${{ matrix.image }}
    needs: test
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: caddy-cloudflare
            context: ./caddy
          - image: cf-hostname-reconciler
            context: ./cf-hostname-reconciler
          - image: cf-failover
            context: ./cf-failover
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/${{ matrix.image }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,format=short
      - uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image }}
