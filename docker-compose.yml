# Portainer stack: every value is inline (no .env file).
# Edit ONLY the block below (x-cf). Nothing under `services:` needs changing.
# Fields marked REQUIRED must be set before deploying.
x-cf: &cf-common
  # REQUIRED. Single Cloudflare token, shared by both services. Permissions:
  #   Zone:Zone:Read  +  Zone:DNS:Edit  +  Zone:SSL and Certificates:Edit
  CF_API_TOKEN: ""
  # REQUIRED. Managed zones, comma-separated, in priority order.
  # The FIRST entry is the default target zone for new custom hostnames.
  # Empty = every zone the token can see.
  CF_DOMAINS: "example.com"
  # REQUIRED. ACME contact email (expiry notices).
  ACME_EMAIL: ""

  # Ingress network shared with the client stacks. Must match the `networks` block.
  CADDY_INGRESS_NETWORKS: &net "proxy"

  # --- Caddy: internal wildcard certificates (issued via DNS-01) ---
  # The base Caddyfile is GENERATED at start. Empty = one single-label wildcard per
  # CF_DOMAINS zone (e.g. *.example.com). Set explicitly to control the list,
  # including deeper wildcards: a Caddy wildcard matches only ONE label, so
  # *.example.com does NOT cover foo.sub.example.com.
  WILDCARD_DOMAINS: "*.example.com"
  DNS_RESOLVERS: "1.1.1.1 1.0.0.1"
  # Alternate ACME CA (leave empty for Let's Encrypt production).
  # Staging: https://acme-staging-v02.api.letsencrypt.org/directory
  ACME_CA: ""
  # "true" prints the generated Caddyfile to the log at start (debugging).
  CADDY_PRINT_CADDYFILE: "false"
  # At boot, create+delete a TXT record (the exact DNS-01 call) and log
  # PREFLIGHT OK/ERROR — catches a token missing Zone:DNS:Edit before ACME retries.
  PREFLIGHT_DNS_CHECK: "true"
  # "true" aborts the container if the preflight fails (instead of only logging).
  PREFLIGHT_DNS_FATAL: "false"

  # --- Reconciler: Cloudflare for SaaS custom hostnames ---
  # Periodic safety-net reconcile, seconds (Docker events trigger sooner).
  RECONCILE_INTERVAL: "3600"
  # Latch: abort the delete phase if it would remove more than N hostnames...
  MAX_DELETIONS_PER_RUN: "5"
  # ...or more than this fraction of all hostnames on Cloudflare.
  MAX_DELETION_RATIO: "0.3"
  # "true" only logs the plan, changes nothing. Recommended on the first deploy.
  DRY_RUN: "false"

  # --- Cloudflared tunnel (optional) ---
  # Connector token from Zero Trust → Networks → Tunnels → your tunnel.
  # Empty = the cloudflared service just idles/errors; leave empty to not use it.
  # In the tunnel's Public Hostnames, point routes at http://caddy:80
  # (e.g. clients.example.com = fallback origin, and *.example.com if you want it).
  TUNNEL_TOKEN: ""

  # --- Failover watcher (optional) ---
  # Probes origin reachability; if it fails, flips FAILOVER_RECORD from A->IP to
  # CNAME->tunnel so traffic detours through the always-on tunnel. Idle until
  # PRIMARY_IP/TUNNEL_TARGET (and HEALTH_URL for http mode) are set.
  #
  # PROBE_MODE "http" (default) GETs HEALTH_URL THROUGH Cloudflare, so the probe
  # crosses the inbound edge->origin hop that a datacenter DDoS blocks — this is
  # what lets the watcher run on THIS host and still detect the outage. Point
  # HEALTH_URL at a permanent, direct-to-IP proxied hostname (never flipped), e.g.
  # a record  origin-direct.example.com  A(proxied) -> your IP.
  # PROBE_MODE "tcp" connects straight to the IP and MUST run off-host.
  FAILOVER_RECORD: "*.example.com"          # the wildcard clients hit
  PRIMARY_IP: ""                            # this server's public IP (A record when healthy)
  TUNNEL_TARGET: ""                         # <tunnel-uuid>.cfargotunnel.com (CNAME on failover)
  PROBE_MODE: "http"                        # http | tcp
  HEALTH_URL: ""                            # http mode: https://origin-direct.example.com
  PING_TARGET: ""                           # tcp mode: host:port; empty = PRIMARY_IP:443
  FAIL_THRESHOLD: "3"
  RECOVER_THRESHOLD: "3"
  CHECK_INTERVAL_SECONDS: "10"

  # --- Shared ---
  LOG_FORMAT: "json"   # text | json
  LOG_LEVEL: "INFO"
  TZ: "UTC"

x-shared: &shared
  restart: unless-stopped
  networks:
    - proxy

services:
  caddy:
    <<: *shared
    image: ghcr.io/drysius/caddy-cloudflare:latest
    container_name: caddy
    ports:
      - 80:80
      - 443:443
      - 443:443/udp
    environment:
      <<: *cf-common
      CADDY_DOCKER_CADDYFILE_PATH: /etc/caddy/Caddyfile
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - caddy_data:/data
      - caddy_config:/config

  cf-reconciler:
    <<: *shared
    image: ghcr.io/drysius/cf-hostname-reconciler:latest
    container_name: cf-reconciler
    # The image runs as non-root (uid node), so it needs the host's `docker`
    # group to read the socket. The GID is host-specific — find yours with:
    #   getent group docker | cut -d: -f3
    # (Alternative: `user: "0:0"` to run as root.)
    group_add:
      - "987"
    environment:
      <<: *cf-common
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      - caddy

  # Outbound-only tunnel to Cloudflare's edge. No exposed ports; reaches Caddy
  # over the internal `proxy` network at http://caddy:80. `tunnel run` picks up
  # TUNNEL_TOKEN from the environment. Remove this service if you don't use it.
  cloudflared:
    <<: *shared
    image: cloudflare/cloudflared:latest
    container_name: cloudflared
    command: tunnel --no-autoupdate run
    environment:
      <<: *cf-common
    depends_on:
      - caddy

  # Flips FAILOVER_RECORD to the tunnel when PRIMARY_IP stops answering.
  # WARNING: running this on the same host it protects is a weak setup — if the
  # host dies, so does the watcher. Prefer running it elsewhere. See
  # cf-failover/README.md. Idles until PRIMARY_IP/TUNNEL_TARGET are set.
  cf-failover:
    <<: *shared
    image: ghcr.io/drysius/cf-failover:latest
    container_name: cf-failover
    environment:
      <<: *cf-common
    depends_on:
      - cloudflared

networks:
  proxy:
    name: *net
    external: true

volumes:
  caddy_data: {}
  caddy_config: {}
